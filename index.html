<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clean Plate Challenge</title>
    
    <!-- เพิ่มบรรทัดนี้: ป้องกันระบบมือถือบล็อกการดึงรูปภาพข้ามโดเมน -->
    <meta name="referrer" content="no-referrer">
    
    <!-- นำเข้า Tailwind CSS เพื่อจัดการความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React และ ReactDOM แบบ Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- นำเข้า Babel เพื่ออ่านโค้ด JSX บนเบราว์เซอร์ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ซ่อน Scrollbar เพื่อให้ดูเหมือนแอปมือถือมากขึ้น */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ตั้งค่า URL ของ Google Apps Script ที่นี่ ---
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx8h6qPcwxj-mIqtgQu0nfSUqa9khcjDlHtGbSC_LmpKNEgXysedpT2pVEhf9kZit7l1g/exec"; 

        // --- ไอคอนต่างๆ (แปลงจาก lucide-react เพื่อให้ใช้ในไฟล์เดียวได้) ---
        const IconUtensils = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
        const IconCamera = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
        const IconLeaf = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const IconUpload = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconTrophy = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 3.31 2.69 6 6 6s6-2.69 6-6V2Z"/></svg>;
        const IconUserCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>;
        const IconHome = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconAward = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>;
        const IconRefreshCw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconDownload = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconSparkles = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const IconTrash = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;

        // ฟังก์ชันสร้าง Hash จากไฟล์รูปภาพ เพื่อป้องกันการอัปโหลดรูปซ้ำ
        const generateHash = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return Math.abs(hash).toString(16);
        };

        // ฟังก์ชันของแท้: ส่งภาพไปให้ AI (Gemini Vision) วิเคราะห์เศษอาหาร
        const analyzeImageWithGemini = async (base64Data) => {
            // 🛑 สำคัญมาก: นำ Gemini API Key มาใส่ในเครื่องหมายคำพูดด้านล่างนี้ (ขอได้ฟรีที่ https://aistudio.google.com/app/apikey)
            const apiKey = "AQ.Ab8RN6K" + "b16_187wWf6L-d8152eu" + "e7qNn9-CH8dXU4KvKW-eZ1Q"; 
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: `คุณคือผู้เชี่ยวชาญด้านการประเมินปริมาณขยะอาหาร (Food Waste Assessor)
หน้าที่ของคุณคือ: วิเคราะห์ภาพภาชนะใส่อาหาร (จาน, ชาม, แก้ว) และประเมิน "ระดับความสะอาด (Clean Plate Percentage)" โดยมีเกณฑ์การให้คะแนนที่เข้มงวดดังนี้:

เกณฑ์การประเมิน (0-100%):
- 95-100% (ดีเยี่ยม): ภาชนะว่างเปล่าอย่างสมบูรณ์ ไม่มีเศษอาหารชิ้นใดๆ เหลืออยู่เลย (อนุโลมให้มีคราบซอสบางๆ ติดจาน หรือคราบน้ำมันเล็กน้อยที่กวาดทานไม่ได้แล้ว)
- 80-94% (ดี): ทานเกือบหมดเกลี้ยง แต่ยังมีเศษชิ้นส่วนเล็กๆ น้อยๆ เช่น เมล็ดข้าวไม่กี่เม็ด, เศษผักชี, หรือน้ำจิ้มที่เหลือติดก้นถ้วยเล็กน้อย
- 50-79% (พอใช้): มีอาหารเหลืออย่างเห็นได้ชัด เช่น มีน้ำซุป/น้ำแกงเหลืออยู่ก้นชามปริมาณหนึ่ง, มีกระดูก, เปลือกกุ้ง, หรือเศษอาหารชิ้นใหญ่ที่ทานไม่หมด
- 10-49% (ต้องปรับปรุง): ทานเหลือเยอะมาก เช่น เหลือน้ำซุปเต็มชาม, เหลือเส้นก๋วยเตี๋ยว, เหลือข้าวเกือบครึ่งจาน หรือมีชิ้นเนื้อเหลือ
- 0% (ไม่ผ่าน/ไม่ใช่รูปอาหาร): เป็นรูปอาหารที่ยังไม่ได้เริ่มทาน, หรือไม่ใช่รูปภาชนะใส่อาหารเลย

คำแนะนำในการดูภาพ:
1. หากเป็นชามก๋วยเตี๋ยว/แกง: ถ้ายังมี "น้ำแกง" หรือ "น้ำซุป" ปริมาณมากเหลืออยู่ (สามารถซดต่อได้) ถือว่าทานไม่หมด ให้คะแนนต่ำกว่า 60% ทันที แม้จะไม่มีเนื้อสัตว์เหลือแล้วก็ตาม
2. คราบ vs. อาหารเหลือ: แยกแยะระหว่าง "คราบอาหารที่ติดจาน (Stains)" (หักคะแนนน้อย) กับ "อาหารที่ตักทานต่อได้ (Leftovers)" (หักคะแนนเยอะ)
3. หากมีหลายภาชนะในภาพ: ให้ประเมินภาชนะที่เหลืออาหารเยอะที่สุดเป็นหลัก

ส่งผลลัพธ์เป็นรูปแบบ JSON เท่านั้น ห้ามมีข้อความอื่นปน โดยใช้โครงสร้างดังนี้:
{"percent": ตัวเลข0ถึง100, "reason": "คำอธิบายภาษาไทยสั้นๆ ไม่เกิน 2 ประโยค"}` },
                        { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                    ]
                }],
                generationConfig: {
                    temperature: 0.1
                }
            };

            let retries = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retries <= 5) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    // ปรับปรุงการดักจับ Error เพื่อให้แสดงข้อความจริงจาก Google API
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error?.message || `API Error: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    let text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                        return JSON.parse(text);
                    }
                    throw new Error("No text in response");
                } catch (error) {
                    console.error("AI Evaluation Error (Attempt " + (retries+1) + "):", error);
                    if (retries === 5) {
                        // คืนค่าข้อความ Error ที่แท้จริงกลับไปแสดงที่หน้า UI
                        return { 
                            percent: 0, 
                            reason: `ระบบ AI ขัดข้อง (${error.message}) โปรดตรวจสอบ API Key หรือการตั้งค่าการเข้าถึง` 
                        };
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[retries]));
                    retries++;
                }
            }
        };

        // ฟังก์ชันช่วยเหลือสำหรับแปลงลิงก์ Google Drive ให้อ่านได้ใน <img> tag
        const getSafeImageUrl = (url) => {
            if (!url) return '';
            
            // ถ้ารูปเป็น Base64 จากเครื่อง (เช่น ในโหมดจำลอง) ให้คืนค่าเดิมเลย
            if (url.startsWith('data:image')) return url;
            
            // ตรวจจับ ID ของรูปภาพจากลิงก์
            const driveIdMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            if (driveIdMatch && driveIdMatch[1]) {
                // เพิ่ม ?authuser=0 เพื่อป้องกันปัญหา Google บังคับให้ล็อกอินบนมือถือ
                return `https://lh3.googleusercontent.com/d/${driveIdMatch[1]}?authuser=0`;
            }
            return url;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ displayName: 'พนักงานนิรนาม', points: 0, avatarUrl: '' });
            const [activeTab, setActiveTab] = useState('home');
            const [leaderboardType, setLeaderboardType] = useState('points'); // เพิ่ม state สลับโหมดจัดอันดับ ('points' หรือ 'count')
            const [timeFilter, setTimeFilter] = useState('all'); // state กรองเวลา (all, this_month, last_month, this_year, last_year)
            const [leaderboard, setLeaderboard] = useState([]);
            const [submissions, setSubmissions] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const [isAvatarUploading, setIsAvatarUploading] = useState(false); // สำหรับการอัปโหลดรูปโปรไฟล์
            const [uploadState, setUploadState] = useState('idle'); // idle, analyzing, uploading, success
            const [aiScore, setAiScore] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [editName, setEditName] = useState('');
            const [saveStatus, setSaveStatus] = useState('');
            
            // สร้างค่าเริ่มต้นสำหรับวันที่ ให้เป็นเวลาปัจจุบันของเครื่อง
            const getLocalDatetime = () => {
                const tzoffset = (new Date()).getTimezoneOffset() * 60000;
                return (new Date(Date.now() - tzoffset)).toISOString().slice(0, 16);
            };
            const [mealDate, setMealDate] = useState(getLocalDatetime());

            const fileInputRef = useRef(null);
            const avatarInputRef = useRef(null); // Ref สำหรับเลือกรูปโปรไฟล์

            const isMockMode = GAS_WEB_APP_URL.includes("YOUR_SCRIPT_ID") || !GAS_WEB_APP_URL;

            // จำลองการเข้าสู่ระบบ
            useEffect(() => {
                let storedUid = localStorage.getItem('clean_plate_uid');
                if (!storedUid) {
                    storedUid = 'emp_' + Math.random().toString(36).substring(2, 10);
                    localStorage.setItem('clean_plate_uid', storedUid);
                }
                setUser({ uid: storedUid });
                setProfile(prev => ({ ...prev, displayName: `พนักงาน_${storedUid.substring(4, 8)}` }));
            }, []);

            const fetchData = async () => {
                if (!user) return;
                setIsLoading(true);
                
                if (isMockMode) {
                    setTimeout(() => {
                        setLeaderboard([
                            { uid: 'mock1', displayName: 'สมหญิง บัญชี', points: 150, avatarUrl: '' },
                            { uid: user.uid, displayName: profile.displayName, points: profile.points || 0, avatarUrl: profile.avatarUrl || '' },
                            { uid: 'mock2', displayName: 'มานะ ไอที', points: 80, avatarUrl: '' }
                        ].sort((a, b) => b.points - a.points));
                        
                        if (submissions.length === 0) {
                            setSubmissions([
                                { uid: 'mock1', displayName: 'สมหญิง บัญชี', imageUrl: 'https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&q=80&w=600', timestamp: Date.now() - 3600000, points: 10 }
                            ]);
                        }
                        setIsLoading(false);
                    }, 500);
                    return;
                }

                try {
                    const response = await fetch(`${GAS_WEB_APP_URL}?uid=${user.uid}`);
                    const data = await response.json();
                    
                    if (data.users) {
                        setLeaderboard(data.users.sort((a, b) => b.points - a.points));
                        const myProfile = data.users.find(u => u.uid === user.uid);
                        if (myProfile) {
                            setProfile(myProfile);
                            if (!editName) setEditName(myProfile.displayName);
                        }
                    }
                    
                    if (data.submissions) {
                        setSubmissions(data.submissions.sort((a, b) => b.timestamp - a.timestamp));
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                if (user) {
                    fetchData();
                }
            }, [user]);

            // อัปโหลดรูปจานอาหาร
            const handleImageUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                // ล้างค่า input ทิ้งเผื่อต้องการเลือกไฟล์เดิมอีกครั้งในอนาคต
                event.target.value = '';

                setIsUploading(true);
                setUploadState('analyzing');
                setAiScore(null);

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        let scaleSize = 1;
                        if (img.width > MAX_WIDTH) {
                            scaleSize = MAX_WIDTH / img.width;
                        }
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const base64Full = canvas.toDataURL('image/jpeg', 0.6);
                        const base64Data = base64Full.split(',')[1]; 

                        // --- ตรวจสอบรูปซ้ำด้วย Hash ---
                        const imgHash = generateHash(base64Data);
                        const savedHashes = JSON.parse(localStorage.getItem('clean_plate_hashes') || '[]');
                        if (savedHashes.includes(imgHash)) {
                            alert("❌ ตรวจพบการใช้รูปภาพซ้ำ!\nคุณเคยส่งรูปภาพนี้ไปแล้ว กรุณาใช้รูปภาพอื่นครับ");
                            setIsUploading(false);
                            setUploadState('idle');
                            return;
                        }

                        // --- นำภาพส่งให้ AI ของจริง (Gemini) วิเคราะห์ ---
                        try {
                            const aiResult = await analyzeImageWithGemini(base64Data);
                            const cleanPercent = aiResult.percent; 
                            
                            let calculatedPoints = 10;
                            // แก้ไขจุดให้คะแนน หากเป็น 0% จะได้ 0 แต้มไปเลย
                            if (cleanPercent === 0) calculatedPoints = 0;
                            else if (cleanPercent < 60) calculatedPoints = 4;
                            else if (cleanPercent < 80) calculatedPoints = 7;
                            else calculatedPoints = 10;
                            
                            setAiScore({ percent: cleanPercent, points: calculatedPoints, reason: aiResult.reason });
                            setUploadState('uploading');

                            const selectedTimestamp = new Date(mealDate).getTime();

                            // เมื่อสำเร็จ ให้จำ Hash ไว้ว่ารูปนี้ถูกใช้แล้ว
                            savedHashes.push(imgHash);
                            localStorage.setItem('clean_plate_hashes', JSON.stringify(savedHashes));

                            if (isMockMode) {
                                setTimeout(() => {
                                    const newPoints = (profile.points || 0) + calculatedPoints;
                                    setProfile(prev => ({ ...prev, points: newPoints }));
                                    setSubmissions(prev => [{
                                        uid: user.uid,
                                        displayName: profile.displayName,
                                        imageUrl: base64Full,
                                        timestamp: selectedTimestamp,
                                        points: calculatedPoints 
                                    }, ...prev].sort((a, b) => b.timestamp - a.timestamp));
                                    
                                    setLeaderboard(prev => {
                                        const newLb = prev.filter(p => p.uid !== user.uid);
                                        newLb.push({ uid: user.uid, displayName: profile.displayName, points: newPoints, avatarUrl: profile.avatarUrl });
                                        return newLb.sort((a, b) => b.points - a.points);
                                    });
                                    
                                    setIsUploading(false);
                                    setUploadState('idle');
                                    setActiveTab('home');
                                }, 1500);
                                return;
                            }

                            try {
                                const payload = {
                                    action: 'submit',
                                    uid: user.uid,
                                    displayName: profile.displayName,
                                    image: base64Data,
                                    mimeType: 'image/jpeg',
                                    filename: `plate_${Date.now()}.jpg`,
                                    points: calculatedPoints,
                                    timestamp: selectedTimestamp 
                                };

                                await fetch(GAS_WEB_APP_URL, {
                                    method: 'POST',
                                    body: JSON.stringify(payload),
                                    headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
                                });

                                await fetchData();
                                setIsUploading(false);
                                setUploadState('idle');
                                setActiveTab('home');
                            } catch (error) {
                                console.error("Upload failed", error);
                                alert("เกิดข้อผิดพลาดในการส่งรูป กรุณาลองใหม่");
                                setIsUploading(false);
                                setUploadState('idle');
                            }
                        } catch (error) {
                            console.error("AI error", error);
                            setIsUploading(false);
                            setUploadState('idle');
                            alert("เกิดข้อผิดพลาดในการวิเคราะห์รูปภาพ กรุณาลองใหม่");
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            // อัปโหลดรูปโปรไฟล์
            const handleAvatarUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setIsAvatarUploading(true);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        // ย่อรูปโปรไฟล์ให้เล็กมากๆ (ประหยัดพื้นที่ Drive)
                        const MAX_WIDTH = 250;
                        let scaleSize = 1;
                        if (img.width > MAX_WIDTH || img.height > MAX_WIDTH) {
                            scaleSize = MAX_WIDTH / Math.max(img.width, img.height);
                        }
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const base64Full = canvas.toDataURL('image/jpeg', 0.6);
                        const base64Data = base64Full.split(',')[1]; 

                        if (isMockMode) {
                            setTimeout(() => {
                                setProfile(prev => ({ ...prev, avatarUrl: base64Full }));
                                setLeaderboard(prev => prev.map(p => p.uid === user.uid ? { ...p, avatarUrl: base64Full } : p));
                                setIsAvatarUploading(false);
                                setSaveStatus('เปลี่ยนรูปโปรไฟล์ (จำลอง) สำเร็จ!');
                                setTimeout(() => setSaveStatus(''), 3000);
                            }, 1000);
                            return;
                        }

                        try {
                            const payload = {
                                action: 'updateAvatar',
                                uid: user.uid,
                                displayName: profile.displayName,
                                image: base64Data,
                                mimeType: 'image/jpeg',
                                filename: `avatar_${user.uid}_${Date.now()}.jpg`
                            };

                            const response = await fetch(GAS_WEB_APP_URL, {
                                method: 'POST',
                                body: JSON.stringify(payload),
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
                            });

                            const result = await response.json();
                            if(result.success) {
                                setProfile(prev => ({ ...prev, avatarUrl: result.avatarUrl }));
                                await fetchData(); // รีเฟรชตารางผู้นำเพื่อโชว์รูปใหม่
                                setSaveStatus('เปลี่ยนรูปโปรไฟล์สำเร็จ!');
                            }
                        } catch (error) {
                            console.error("Avatar Upload failed", error);
                            setSaveStatus('อัปโหลดรูปไม่สำเร็จ กรุณาลองใหม่');
                        } finally {
                            setIsAvatarUploading(false);
                            setTimeout(() => setSaveStatus(''), 3000);
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleDeleteSubmission = async (sub) => {
                if (!confirm("คุณต้องการลบรูปภาพนี้ใช่หรือไม่? คะแนนที่ได้รับจากรูปนี้จะถูกหักออก")) return;
                
                setIsLoading(true);

                if (isMockMode) {
                    setTimeout(() => {
                        setSubmissions(prev => prev.filter(item => item.timestamp !== sub.timestamp));
                        const pointsToDeduct = sub.points || 10;
                        const newPoints = Math.max(0, (profile.points || 0) - pointsToDeduct);
                        setProfile(prev => ({ ...prev, points: newPoints }));
                        setLeaderboard(prev => {
                            const newLb = prev.map(p => p.uid === user.uid ? { ...p, points: newPoints } : p);
                            return newLb.sort((a, b) => b.points - a.points);
                        });
                        setIsLoading(false);
                    }, 800);
                    return;
                }

                try {
                    const payload = {
                        action: 'delete',
                        uid: user.uid,
                        timestamp: sub.timestamp,
                        points: sub.points || 10 
                    };

                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });

                    await fetchData();
                } catch (error) {
                    console.error("Delete failed", error);
                    alert("เกิดข้อผิดพลาดในการลบ กรุณาลองใหม่");
                    setIsLoading(false);
                }
            };

            const saveProfileName = async () => {
                if (!user || !editName.trim()) return;
                
                if (isMockMode) {
                    setProfile(prev => ({ ...prev, displayName: editName.trim() }));
                    setLeaderboard(prev => prev.map(p => p.uid === user.uid ? { ...p, displayName: editName.trim() } : p));
                    setSaveStatus('บันทึกชื่อสำเร็จ (ทดสอบ)!');
                    setTimeout(() => setSaveStatus(''), 3000);
                    return;
                }

                try {
                    const payload = {
                        action: 'updateProfile',
                        uid: user.uid,
                        displayName: editName.trim()
                    };

                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });

                    setSaveStatus('บันทึกชื่อสำเร็จ!');
                    setProfile(prev => ({ ...prev, displayName: editName.trim() }));
                    await fetchData();
                    setTimeout(() => setSaveStatus(''), 3000);
                } catch (error) {
                    console.error("Save name failed", error);
                    setSaveStatus('เกิดข้อผิดพลาด กรุณาลองใหม่');
                    setTimeout(() => setSaveStatus(''), 3000);
                }
            };

            // ฟังก์ชันสำหรับค้นหาชื่อล่าสุดของแต่ละคน
            const getLatestDisplayName = (uid, originalName) => {
                const foundUser = leaderboard.find(u => u.uid === uid);
                return foundUser ? foundUser.displayName : originalName;
            };

            // ฟังก์ชันช่วยคัดกรองข้อมูลตามช่วงเวลาที่เลือก
            const filterSubmissionsByTime = (subs, filterType) => {
                if (filterType === 'all') return subs;
                
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth();
                
                return subs.filter(sub => {
                    const subDate = new Date(sub.timestamp);
                    const subYear = subDate.getFullYear();
                    const subMonth = subDate.getMonth();
                    
                    if (filterType === 'this_month') {
                        return subYear === currentYear && subMonth === currentMonth;
                    }
                    if (filterType === 'last_month') {
                        const lastMonthYear = currentMonth === 0 ? currentYear - 1 : currentYear;
                        const lastMonth = currentMonth === 0 ? 11 : currentMonth - 1;
                        return subYear === lastMonthYear && subMonth === lastMonth;
                    }
                    if (filterType === 'this_year') {
                        return subYear === currentYear;
                    }
                    if (filterType === 'last_year') {
                        return subYear === currentYear - 1;
                    }
                    return true;
                });
            };

            // ฟังก์ชันคำนวณและจัดเตรียมข้อมูลตารางผู้นำ โดยคำนวณจากช่วงเวลาที่เลือก
            const getProcessedLeaderboard = () => {
                const filteredSubs = filterSubmissionsByTime(submissions, timeFilter);

                return leaderboard.map(u => {
                    // หาผลงานของ user คนนี้เฉพาะในช่วงเวลาที่กรองมา
                    const userSubs = filteredSubs.filter(s => s.uid === u.uid);
                    // รวมคะแนนที่ได้จากเฉพาะช่วงเวลานี้
                    const periodPoints = userSubs.reduce((sum, s) => sum + (Number(s.points) || 10), 0);
                    
                    return {
                        ...u,
                        // ถ้าเป็น all-time ให้ดึงคะแนนรวมจากฐานข้อมูลเพื่อความชัวร์ (เพราะบางคนอาจมีคะแนนตั้งต้น) ถ้าเป็นช่วงอื่นให้ใช้ที่บวกใหม่
                        calculatedPoints: timeFilter === 'all' ? (u.points || 0) : periodPoints,
                        submissionCount: userSubs.length
                    };
                })
                .filter(u => timeFilter === 'all' || u.calculatedPoints > 0 || u.submissionCount > 0) // ซ่อนคนไม่มีผลงาน หากไม่ได้เลือก all
                .sort((a, b) => {
                    if (leaderboardType === 'count') {
                        // ถ้าเลือกดูตามจำนวนครั้ง ให้เรียงตามจำนวนครั้งก่อน ถ้าเท่ากันให้ดูคะแนน
                        if (b.submissionCount !== a.submissionCount) return b.submissionCount - a.submissionCount;
                        return (b.calculatedPoints || 0) - (a.calculatedPoints || 0);
                    }
                    // ค่าเริ่มต้น: เรียงตามคะแนน ถ้าคะแนนเท่ากันให้ดูจำนวนครั้ง
                    if ((b.calculatedPoints || 0) !== (a.calculatedPoints || 0)) return (b.calculatedPoints || 0) - (a.calculatedPoints || 0);
                    return b.submissionCount - a.submissionCount;
                });
            };

            // ฟังก์ชันส่งออกข้อมูลเป็น CSV (อัปเดตให้ดึงข้อมูลตามช่วงเวลาที่กรองด้วย)
            const exportToCSV = () => {
                const currentLeaderboard = getProcessedLeaderboard();
                
                if (currentLeaderboard.length === 0) {
                    alert("ยังไม่มีข้อมูลสำหรับส่งออกในช่วงเวลานี้");
                    return;
                }
                
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                csvContent += `อันดับ,ชื่อผู้ใช้งาน,คะแนนสะสม (${timeFilter}),จำนวนครั้งที่ส่ง\n`;

                currentLeaderboard.forEach((u, index) => {
                    const rank = index + 1;
                    const name = u.displayName ? u.displayName.replace(/"/g, '""') : 'พนักงานนิรนาม';
                    const points = u.calculatedPoints || 0;
                    const count = u.submissionCount || 0;
                    csvContent += `${rank},"${name}",${points},${count}\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                const dateStr = new Date().toISOString().slice(0,10);
                link.setAttribute("download", `clean_plate_ranking_${timeFilter}_${dateStr}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // --- ส่วนของ UI (หน้าตาแอป) ---
            const renderHome = () => (
                <div className="p-4 space-y-6">
                    {isMockMode && (
                        <div className="bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-xl text-sm font-medium">
                        ⚠️ กำลังใช้งานในโหมดทดลอง (เนื่องจากยังไม่ได้ใส่ Google Apps Script URL)
                        </div>
                    )}
                    
                    <div className="bg-white rounded-xl p-5 shadow-sm border border-green-100 flex items-center gap-4">
                        <div className="bg-green-100 p-3 rounded-full text-green-600">
                        <IconUtensils className="w-8 h-8" />
                        </div>
                        <div>
                        <h2 className="font-bold text-gray-800">กินหมดจาน ลดขยะอาหาร</h2>
                        <p className="text-sm text-gray-500">ร่วมสร้างความยั่งยืนไปด้วยกัน ♻️🌱</p>
                        </div>
                    </div>

                    <div>
                        <div className="flex justify-between items-center mb-3">
                        <h3 className="font-bold text-gray-700 flex items-center gap-2">
                            <IconCamera className="w-5 h-5 text-green-600" /> ภาพถ่ายล่าสุด
                        </h3>
                        <button onClick={fetchData} className="text-gray-400 hover:text-green-600 active:rotate-180 transition-transform">
                            <IconRefreshCw className={`w-5 h-5 ${isLoading ? 'animate-spin text-green-500' : ''}`} />
                        </button>
                        </div>

                        <div className="space-y-4">
                        {submissions.length === 0 && !isLoading ? (
                            <div className="text-center py-8 bg-white rounded-xl border border-dashed border-gray-300">
                            <p className="text-gray-500">ยังไม่มีภาพถ่าย มาร่วมเป็นคนแรกสิ!</p>
                            </div>
                        ) : (
                            submissions.map((sub, idx) => {
                                // เช็คว่าใน leaderboard มีข้อมูลคนคนนี้ไหม เพื่อดึงชื่อและรูปโปรไฟล์มาแสดง
                                const userInLeaderboard = leaderboard.find(u => u.uid === sub.uid);
                                const displayNameToShow = userInLeaderboard ? userInLeaderboard.displayName : sub.displayName;
                                const avatarUrlToShow = userInLeaderboard ? userInLeaderboard.avatarUrl : null;
                                
                                const isMySubmission = String(sub.uid).trim() === String(user?.uid).trim();
                                
                                return (
                                <div key={idx} className="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                                    <div className="p-3 flex items-center justify-between border-b border-gray-50">
                                        <div className="flex items-center gap-2 overflow-hidden">
                                            {/* แสดงรูปโปรไฟล์ หรือ ตัวอักษรตัวแรก */}
                                            <div className="w-9 h-9 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold text-xs uppercase shrink-0 overflow-hidden">
                                                {avatarUrlToShow ? (
                                                    <img src={getSafeImageUrl(avatarUrlToShow)} className="w-full h-full object-cover" alt="avatar" />
                                                ) : (
                                                    displayNameToShow?.charAt(0) || '?'
                                                )}
                                            </div>
                                            <div className="truncate">
                                                <p className="font-medium text-sm text-gray-800 truncate">{displayNameToShow}</p>
                                                <p className="text-xs text-gray-400">
                                                {new Date(sub.timestamp).toLocaleString('th-TH')}
                                                </p>
                                            </div>
                                        </div>
                                        {isMySubmission && (
                                            <button 
                                                onClick={() => handleDeleteSubmission(sub)}
                                                className="text-red-400 hover:text-red-600 p-2 rounded-full hover:bg-red-50 transition-colors shrink-0"
                                                title="ลบรูปภาพนี้"
                                                disabled={isLoading}
                                            >
                                                <IconTrash className="w-4 h-4" />
                                            </button>
                                        )}
                                    </div>
                                    
                                    <img 
                                        src={getSafeImageUrl(sub.imageUrl)} 
                                        alt="Clean Plate" 
                                        className="w-full h-56 object-cover bg-gray-200" 
                                        loading="lazy"
                                        referrerPolicy="no-referrer" 
                                        onError={(e) => {
                                            if (!e.target.dataset.retried) {
                                                e.target.dataset.retried = "true";
                                                setTimeout(() => {
                                                    e.target.src = getSafeImageUrl(sub.imageUrl) + '&retry=' + new Date().getTime();
                                                }, 2000);
                                            } else {
                                                e.target.onerror = null; 
                                                e.target.src = "data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22600%22%20height%3D%22400%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23f3f4f6%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20fill%3D%22%239ca3af%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%20font-family%3D%22sans-serif%22%20font-size%3D%2220%22%3E%E0%B8%A3%E0%B8%B9%E0%B8%9B%E0%B8%A0%E0%B8%B2%E0%B8%9E%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B8%AA%E0%B8%B2%E0%B8%A1%E0%B8%B2%E0%B8%A3%E0%B8%96%E0%B9%81%E0%B8%AA%E0%B8%94%E0%B8%87%E0%B8%9C%E0%B8%A5%E0%B9%84%E0%B8%94%E0%B9%89%3C%2Ftext%3E%3C%2Fsvg%3E";
                                            }
                                        }}
                                    />
                                    <div className="p-3 bg-green-50 text-green-800 text-sm font-medium flex items-center justify-center gap-1">
                                    <IconLeaf className="w-4 h-4" /> ได้รับ {sub.points || 10} แต้มรักษ์โลก!
                                    </div>
                                </div>
                                );
                            })
                        )}
                        </div>
                    </div>
                </div>
            );

            const renderSubmit = () => (
                <div className="p-6 flex flex-col items-center justify-center h-full text-center space-y-6">
                    
                    {uploadState === 'idle' && (
                        <>
                            <div className="bg-green-100 p-6 rounded-full text-green-600 mb-2">
                                <IconUpload className="w-16 h-16" />
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">ส่งภาพถ่ายจานเปล่า</h2>
                                <p className="text-gray-500 mt-2 text-sm">
                                ถ่ายภาพจานอาหารที่คุณทานหมดเกลี้ยง<br/>ระบบ AI จะประเมินคะแนนจากความสะอาด (สูงสุด 10 แต้ม)
                                </p>
                            </div>
                        </>
                    )}

                    {uploadState === 'analyzing' && (
                        <div className="flex flex-col items-center justify-center space-y-4 py-8">
                            <div className="relative">
                                <div className="absolute inset-0 bg-blue-400 blur-xl opacity-30 animate-pulse rounded-full"></div>
                                <IconSparkles className="w-20 h-20 text-blue-500 animate-bounce relative z-10" />
                            </div>
                            <h2 className="text-xl font-bold text-blue-600 animate-pulse">AI กำลังวิเคราะห์ภาพ...</h2>
                            <p className="text-gray-500 text-sm">ค้นหาเศษอาหารที่ตกค้างในจาน</p>
                        </div>
                    )}

                    {uploadState === 'uploading' && aiScore && (
                        <div className="flex flex-col items-center justify-center space-y-4 py-4 w-full">
                            <div className="bg-gradient-to-r from-blue-500 to-indigo-600 w-full rounded-2xl p-6 text-white shadow-lg">
                                <IconSparkles className="w-10 h-10 mx-auto mb-2 text-blue-200" />
                                <h3 className="text-lg font-medium opacity-90">ผลการประเมินจาก AI</h3>
                                <div className="text-3xl font-bold mt-1 mb-2">ความสะอาด {aiScore.percent}%</div>
                                
                                {/* เพิ่มส่วนแสดงเหตุผลที่ AI ประเมิน */}
                                <div className="bg-white/10 p-3 rounded-lg text-sm mb-3 font-medium shadow-inner italic">
                                    "{aiScore.reason}"
                                </div>
                                
                                <div className="bg-white/20 rounded-lg p-2 backdrop-blur-sm inline-block px-4">
                                    ได้รับ <span className="font-bold text-yellow-300 text-xl">{aiScore.points}</span> แต้ม
                                </div>
                            </div>
                            <div className="flex items-center gap-2 text-gray-500 mt-4">
                                <div className="animate-spin rounded-full h-4 w-4 border-2 border-gray-400 border-t-transparent"></div>
                                <span className="text-sm">กำลังบันทึกคะแนน...</span>
                            </div>
                        </div>
                    )}

                    <input 
                        type="file" 
                        accept="image/*" 
                        className="hidden" 
                        ref={fileInputRef}
                        onChange={handleImageUpload}
                        disabled={isUploading}
                    />
                    
                    {uploadState === 'idle' && (
                        <div className="w-full max-w-xs space-y-4">
                            {/* เพิ่มส่วนตั้งค่าเวลาย้อนหลัง */}
                            <div className="text-left bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                <label className="block text-sm font-medium text-gray-700 mb-1">📅 วันที่และเวลารับประทาน</label>
                                <input 
                                    type="datetime-local" 
                                    value={mealDate}
                                    onChange={(e) => setMealDate(e.target.value)}
                                    className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:border-green-500 bg-gray-50"
                                    disabled={isUploading}
                                />
                                <p className="text-xs text-gray-400 mt-1">สามารถเลือกเวลาย้อนหลังได้</p>
                            </div>
                            
                            <button 
                                onClick={() => fileInputRef.current?.click()}
                                disabled={isUploading}
                                className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-200 transition-transform active:scale-95 flex items-center justify-center gap-2 disabled:opacity-70 disabled:active:scale-100"
                            >
                                <IconCamera className="w-6 h-6" /> ถ่ายภาพ / แนบรูปภาพ
                            </button>
                        </div>
                    )}

                    {isMockMode && uploadState === 'idle' && (
                        <p className="text-xs text-yellow-600 bg-yellow-50 p-2 rounded border border-yellow-200">
                        โหมดทดลอง: อัปโหลดรูปจะถูกจำลองขึ้นเพื่อให้คุณทดสอบได้
                        </p>
                    )}
                </div>
            );

            const renderLeaderboard = () => {
                const currentLeaderboard = getProcessedLeaderboard();

                return (
                    <div className="p-4 space-y-4">
                        <div className="bg-gradient-to-r from-green-500 to-emerald-600 rounded-xl p-6 text-white text-center shadow-md relative">
                            <button 
                                onClick={exportToCSV}
                                className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors"
                                title="ดาวน์โหลดข้อมูลอันดับ (CSV)"
                            >
                                <IconDownload className="w-5 h-5 text-white" />
                            </button>
                            <IconTrophy className="w-12 h-12 mx-auto mb-2 text-yellow-300" />
                            <h2 className="text-xl font-bold">กระดานผู้นำ</h2>
                            <p className="opacity-90 text-sm">ใครคือสุดยอดนักรักษ์โลก?</p>
                            
                            {/* เมนู Dropdown เลือกกรองเวลา */}
                            <select 
                                value={timeFilter} 
                                onChange={(e) => setTimeFilter(e.target.value)}
                                className="w-full mt-4 p-2 rounded-lg text-sm text-gray-800 bg-white/90 border-0 outline-none focus:ring-2 focus:ring-green-300 shadow-inner"
                            >
                                <option value="all">🏆 ตลอดกาล (All Time)</option>
                                <option value="this_month">📅 เดือนนี้</option>
                                <option value="last_month">📅 เดือนก่อนหน้า</option>
                                <option value="this_year">📆 ปีนี้</option>
                                <option value="last_year">📆 ปีก่อนหน้า</option>
                            </select>
                        </div>

                        {/* เมนูแท็บเพื่อสลับการจัดอันดับ */}
                        <div className="flex bg-white rounded-xl p-1 shadow-sm border border-gray-100">
                            <button 
                                onClick={() => setLeaderboardType('points')}
                                className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-colors ${leaderboardType === 'points' ? 'bg-green-100 text-green-700 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`}
                            >
                                🏆 ตามคะแนน
                            </button>
                            <button 
                                onClick={() => setLeaderboardType('count')}
                                className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-colors ${leaderboardType === 'count' ? 'bg-green-100 text-green-700 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`}
                            >
                                📸 ตามจำนวนครั้ง
                            </button>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            {currentLeaderboard.length === 0 && !isLoading && <p className="text-center p-6 text-gray-500">ยังไม่มีข้อมูลในช่วงเวลานี้</p>}
                            {currentLeaderboard.map((u, index) => (
                            <div key={u.uid} className={`flex items-center p-4 border-b border-gray-50 last:border-0 ${user?.uid === u.uid ? 'bg-green-50' : ''}`}>
                                <div className="w-8 font-bold text-gray-400 text-center shrink-0">
                                {index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}
                                </div>
                                
                                {/* แสดงรูปโปรไฟล์ในกระดานผู้นำ */}
                                <div className="w-10 h-10 ml-2 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold text-sm uppercase overflow-hidden shrink-0 shadow-inner">
                                    {u.avatarUrl ? (
                                        <img src={getSafeImageUrl(u.avatarUrl)} className="w-full h-full object-cover" alt="avatar" />
                                    ) : (
                                        u.displayName?.charAt(0) || '?'
                                    )}
                                </div>

                                <div className="flex-1 ml-3 truncate">
                                <p className={`font-medium ${user?.uid === u.uid ? 'text-green-700' : 'text-gray-800'} truncate`}>
                                    {u.displayName} {user?.uid === u.uid && '(คุณ)'}
                                </p>
                                </div>
                                
                                <div className="font-bold text-green-600 flex flex-col items-end shrink-0 ml-2">
                                    {leaderboardType === 'points' ? (
                                        <>
                                            <div className="flex items-center gap-1">
                                                {u.calculatedPoints || 0} <span className="text-xs font-normal text-gray-500">แต้ม</span>
                                            </div>
                                            <div className="text-[10px] text-gray-400 font-normal">{u.submissionCount} ครั้ง</div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="flex items-center gap-1">
                                                {u.submissionCount || 0} <span className="text-xs font-normal text-gray-500">ครั้ง</span>
                                            </div>
                                            <div className="text-[10px] text-gray-400 font-normal">{u.calculatedPoints || 0} แต้ม</div>
                                        </>
                                    )}
                                </div>
                            </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderProfile = () => (
                <div className="p-4 space-y-6">
                    <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-16 bg-green-50"></div>
                        
                        <div className="relative w-24 h-24 mx-auto mb-4">
                            {/* กรอบแสดงรูปโปรไฟล์ */}
                            <div className="w-full h-full bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl font-bold border-4 border-white shadow-sm uppercase overflow-hidden">
                                {profile.avatarUrl ? (
                                    <img src={getSafeImageUrl(profile.avatarUrl)} className="w-full h-full object-cover" alt="profile" />
                                ) : (
                                    profile.displayName?.charAt(0) || '?'
                                )}
                            </div>
                            
                            {/* ปุ่มเปลี่ยนรูปโปรไฟล์ */}
                            <button 
                                onClick={() => avatarInputRef.current?.click()}
                                disabled={isAvatarUploading}
                                className="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow-md border border-gray-100 hover:bg-gray-50 text-green-600 z-10 transition-transform active:scale-95"
                                title="เปลี่ยนรูปโปรไฟล์"
                            >
                                {isAvatarUploading ? (
                                    <div className="animate-spin h-4 w-4 border-2 border-green-600 border-t-transparent rounded-full"></div>
                                ) : (
                                    <IconCamera className="w-4 h-4" />
                                )}
                            </button>
                            
                            <input 
                                type="file" 
                                accept="image/*" 
                                className="hidden" 
                                ref={avatarInputRef}
                                onChange={handleAvatarUpload}
                                disabled={isAvatarUploading}
                            />
                        </div>

                        <h2 className="text-xl font-bold text-gray-800 mb-1">{profile.displayName}</h2>
                        <p className="text-green-600 font-medium bg-green-50 inline-block px-3 py-1 rounded-full">{profile.points || 0} แต้มสะสม</p>
                    </div>

                    <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-4">
                        <h3 className="font-bold text-gray-700">ตั้งค่าโปรไฟล์</h3>
                        
                        <div>
                        <label className="block text-sm font-medium text-gray-600 mb-1">ชื่อที่แสดงในระบบ</label>
                        <input 
                            type="text" 
                            value={editName}
                            onChange={(e) => setEditName(e.target.value)}
                            className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all"
                            placeholder="เช่น สมชาย บัญชี"
                        />
                        </div>
                        
                        <button 
                        onClick={saveProfileName}
                        className="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-lg transition-colors shadow-sm"
                        >
                        บันทึกชื่อ
                        </button>
                        
                        {saveStatus && (
                        <p className={`text-center text-sm font-medium ${saveStatus.includes('สำเร็จ') ? 'text-green-600' : 'text-red-500'}`}>
                            {saveStatus}
                        </p>
                        )}
                    </div>
                </div>
            );

            const NavItem = ({ id, icon: Icon, label }) => {
                const isActive = activeTab === id;
                return (
                <button 
                    onClick={() => setActiveTab(id)}
                    className={`flex flex-col items-center justify-center w-16 h-14 rounded-xl transition-all ${
                    isActive ? 'text-green-600 bg-green-50' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-50'
                    }`}
                >
                    <div className={`${isActive ? 'scale-110 mb-1' : 'mb-1'} transition-transform`}>
                        <Icon className="w-6 h-6" />
                    </div>
                    <span className="text-[10px] font-medium">{label}</span>
                </button>
                );
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-gray-50 text-gray-800 font-sans shadow-lg overflow-hidden relative">
                    <header className="bg-green-600 text-white p-4 shadow-md z-10 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                        <IconLeaf className="w-6 h-6" />
                        <h1 className="font-bold text-lg">Clean Plate</h1>
                        </div>
                        {user && (
                        <div className="text-sm bg-green-700 px-3 py-1 rounded-full flex items-center gap-1 shadow-inner">
                            <IconAward className="w-4 h-4 text-yellow-300" />
                            <span className="font-medium">{profile.points || 0} แต้ม</span>
                        </div>
                        )}
                    </header>

                    <main className="flex-1 overflow-y-auto pb-20">
                        {!user || (isLoading && leaderboard.length === 0) ? (
                        <div className="flex items-center justify-center h-full">
                            <div className="animate-spin rounded-full h-10 w-10 border-4 border-green-200 border-t-green-600"></div>
                        </div>
                        ) : (
                        <div className="h-full">
                            {activeTab === 'home' && renderHome()}
                            {activeTab === 'submit' && renderSubmit()}
                            {activeTab === 'leaderboard' && renderLeaderboard()}
                            {activeTab === 'profile' && renderProfile()}
                        </div>
                        )}
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 shadow-[0_-2px_15px_rgba(0,0,0,0.05)] z-10 pb-4">
                        <NavItem id="home" icon={IconHome} label="หน้าแรก" />
                        <NavItem id="submit" icon={IconCamera} label="ส่งรูป" />
                        <NavItem id="leaderboard" icon={IconTrophy} label="อันดับ" />
                        <NavItem id="profile" icon={IconUserCircle} label="โปรไฟล์" />
                    </nav>
                </div>
            );
        }

        // --- ทำการ Render แอปลงบนหน้าเว็บ ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
